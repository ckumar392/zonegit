name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, short description of the actual behaviour.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Smallest set of commands that reproduces the issue. Paste real terminal output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: zonegit version
      description: Output of `zonegit --version` or the commit SHA you built from.
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
  - type: input
    id: os
    attributes:
      label: OS / arch
      description: e.g. macOS 14 arm64, Ubuntu 24.04 amd64.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, theories.
