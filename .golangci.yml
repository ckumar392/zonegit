version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
    - prealloc
    - bodyclose
    - nilerr
  settings:
    revive:
      rules:
        - name: var-naming
          disabled: false
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ckumar392/zonegit

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
